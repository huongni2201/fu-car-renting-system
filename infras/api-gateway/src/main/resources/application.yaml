server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: car-service
              uri: lb://car-service
              predicates:
                - Path=/api/v1/cars/**

            - id: customer-service
              uri: lb://customer-service
              predicates:
                - Path=/api/v1/customers/**

            - id: renting-service
              uri: lb://renting-service
              predicates:
                - Path=/api/v1/rentings/**

            - id: manufacturer-service
              uri: lb://manufacturer-service
              predicates:
                - Path=/api/v1/manufacturers/**

            - id: supplier-service
              uri: lb://supplier-service
              predicates:
                - Path=/api/v1/suppliers/**


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}