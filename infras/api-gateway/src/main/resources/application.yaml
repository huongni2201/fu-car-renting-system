server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: car-service
              uri: lb://car-service
              predicates:
                - Path=/api/v1/cars/**

            - id: customer-service
              uri: lb://customer-service
              predicates:
                - Path=/api/v1/customers/**

            - id: renting-service
              uri: lb://renting-service
              predicates:
                - Path=/api/v1/rentings/**
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

app:
  admin:
    email: admin@fu-car.com
    password: admin123
  jwt:
    secret: fu-car-renting-system-secret-key-change-me
    expiration-seconds: 86400
  internal-secret: fu-car-internal-secret-change-me
