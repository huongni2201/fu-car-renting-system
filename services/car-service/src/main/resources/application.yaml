server:
  port: 8082

spring:
  application:
    name: car-service
  datasource:
    url: jdbc:postgresql://localhost:5434/car_db
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

app:
  internal-secret: fu-car-internal-secret-change-me

logging:
  level:
    com.example.carservice: DEBUG

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
